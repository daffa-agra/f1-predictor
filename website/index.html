<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Predictor Pro | 2026 Season Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Titillium+Web:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-deep: #050505; --f1-red: #e10600; --accent-blue: #00d2ff; }
        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(225, 6, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 210, 255, 0.25) 0%, transparent 40%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .f1-italic { font-family: 'Titillium Web', sans-serif; font-style: italic; font-weight: 900; text-transform: uppercase; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass:hover { border-color: rgba(255, 255, 255, 0.2); transform: translateY(-8px); box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.9); } }
        .loading-bar { width: 0%; height: 2px; background: var(--f1-red); animation: load 2.5s forwards cubic-bezier(0.65, 0, 0.35, 1); }
        @keyframes load { to { width: 100%; } }
        
        .driver-image-container {
            position: relative;
            height: 280px;
            background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, transparent 100%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }
        .driver-image {
            height: 300px;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.7));
            transition: transform 0.4s;
            position: relative;
            z-index: 2;
        }
        .glass:hover .driver-image { transform: scale(1.05); }
        
        .circuit-glow { filter: drop-shadow(0 0 15px rgba(225, 6, 0, 0.7)); }
        .venue-card { background: radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, transparent 100%); }
        .tab-active { border-bottom: 2px solid var(--f1-red); color: #fff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const teamColors = {
            'Red Bull Racing': '#3671C6', 'McLaren': '#FF8000', 'Ferrari': '#E80020',
            'Mercedes': '#27F4D2', 'Aston Martin': '#229971', 'RB': '#6692FF',
            'Racing Bulls': '#6692FF', 'Haas F1 Team': '#B6BABD', 'Haas': '#B6BABD',
            'Williams': '#64C4FF', 'Alpine': '#0093CC', 'Audi': '#FFFFFF', 'Cadillac': '#FAB900'
        };

        const driverRefMap = {
            'VERSTAPPEN': 'MAXVER01_Max_Verstappen/maxver01',
            'PEREZ': 'SERPER01_Sergio_Perez/serper01',
            'HAMILTON': 'LEWHAM01_Lewis_Hamilton/lewham01',
            'LECLERC': 'CHALEC01_Charles_Leclerc/chalec01',
            'NORRIS': 'LANNOR01_Lando_Norris/lannor01',
            'PIASTRI': 'OSCPIA01_Oscar_Piastri/oscpia01',
            'RUSSELL': 'GEORUS01_George_Russell/georus01',
            'ALONSO': 'FERALO01_Fernando_Alonso/feralo01',
            'STROLL': 'LANSTR01_Lance_Stroll/lanstr01',
            'GASLY': 'PIEGAS01_Pierre_Gasly/piegas01',
            'ALBON': 'ALEALB01_Alexander_Albon/alealb01',
            'SAINZ': 'CARSAI01_Carlos_Sainz/carsai01',
            'HULKENBERG': 'NICHUL01_Nico_Hulkenberg/nichul01',
            'BOTTAS': 'VALBOT01_Valtteri_Bottas/valbot01',
            'LAWSON': 'LIALAW01_Liam_Lawson/lialaw01',
            'HADJAR': 'ISAHAD01_Isack_Hadjar/isahad01',
            'BEARMAN': 'OLLBEA01_Oliver_Bearman/ollbea01',
            'ANTONELLI': 'KIMANT01_Kimi_Antonelli/kimant01'
        };

        // Complete 2026 Season Circuit Map
        const circuitIdMap = {
            'Australian Grand Prix': 'melbourne-1',
            'Chinese Grand Prix': 'shanghai-1',
            'Japanese Grand Prix': 'suzuka-1',
            'Bahrain Grand Prix': 'bahrain-1',
            'Saudi Arabian Grand Prix': 'jeddah-1',
            'Miami Grand Prix': 'miami-1',
            'Canadian Grand Prix': 'montreal-1',
            'Monaco Grand Prix': 'monaco-1',
            'Spanish Grand Prix': 'catalunya-1',
            'Austrian Grand Prix': 'spielberg-1',
            'British Grand Prix': 'silverstone-1',
            'Belgian Grand Prix': 'spa-francorchamps-1',
            'Hungarian Grand Prix': 'hungaroring-1',
            'Dutch Grand Prix': 'zandvoort-1',
            'Italian Grand Prix': 'monza-1',
            'Madrid Grand Prix': 'monaco-1', // Fallback for new 2026 street circuit
            'Azerbaijan Grand Prix': 'baku-1',
            'Singapore Grand Prix': 'marina-bay-1',
            'United States Grand Prix': 'austin-1',
            'Mexican Grand Prix': 'mexico-city-1',
            'São Paulo Grand Prix': 'interlagos-1',
            'Las Vegas Grand Prix': 'las-vegas-1',
            'Qatar Grand Prix': 'lusail-1',
            'Abu Dhabi Grand Prix': 'yas-marina-1'
        };

        const getHeadshotUrl = (name) => {
            const cleanName = name.split(' ').pop().toUpperCase();
            const ref = driverRefMap[cleanName];
            if (ref) return `https://media.formula1.com/content/dam/fom-website/drivers/${ref.charAt(0)}/${ref}.png.transform/4col/image.png`;
            return null;
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6m12 5h1.5a2.5 2.5 0 0 0 0-5H18m-2 18H8m4-4V7M7 21a2 2 0 0 1-2-2m14 2a2 2 0 0 0 2-2M15 3H9a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2Z" />,
                activity: <path d="M22 12h-4l-3 9L9 3l-3 9H2" />,
                map: <path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0zM15 5.764v15M9 3.236v15" />,
                zap: <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />,
                alert: <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />,
                command: <path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3ZM6 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3Z" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        const IntelSection = ({ metrics }) => (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20 lg:mb-24">
                {metrics.map((item, i) => (
                    <div key={i} className="glass p-12 rounded-[56px] border-l-[10px] flex flex-col justify-between group" style={{ borderLeftColor: i === 0 ? 'var(--accent-blue)' : i === 1 ? '#00fbff' : 'var(--f1-red)' }}>
                        <div className="flex items-center gap-6 mb-10">
                            <div className="w-16 h-16 rounded-3xl bg-white/5 flex items-center justify-center text-white/20 group-hover:text-white transition-colors">
                                <Icon name={item.i} size={32} />
                            </div>
                            <span className="text-[13px] font-black uppercase tracking-[0.4em] opacity-40">{item.l}</span>
                        </div>
                        <div className="flex items-end justify-between">
                            <span className="text-5xl font-black f1-italic tracking-tighter leading-none">{item.v}</span>
                            <div className="w-10 h-1.5 bg-white/10 rounded-full"></div>
                        </div>
                    </div>
                ))}
            </div>
        );

        const VenueCommandCenter = ({ event, date }) => {
            const circuitSuffix = circuitIdMap[event] || 'monaco-1';
            const circuitUrl = `https://cdn.jsdelivr.net/gh/julesr0y/f1-circuits-svg@main/circuits/white-outline/${circuitSuffix}.svg`;
            
            return (
                <div className="glass venue-card p-16 rounded-[64px] mb-24 lg:mb-32 overflow-hidden relative border-t-4 border-t-f1-red/30">
                    <div className="absolute top-0 right-0 w-1/2 h-full bg-gradient-to-l from-f1-red/10 to-transparent pointer-events-none"></div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center relative z-10">
                        <div className="order-2 lg:order-1">
                            <div className="flex items-center gap-8 mb-12">
                                <div className="w-20 h-20 rounded-[32px] bg-f1-red/15 flex items-center justify-center text-f1-red shadow-2xl border border-f1-red/10"><Icon name="map" size={40} /></div>
                                <div>
                                    <h2 className="text-5xl font-black f1-italic tracking-tighter mb-2 uppercase">Venue Analytics</h2>
                                    <p className="text-white/30 text-lg font-bold tracking-[0.2em] uppercase">{event} • 2026 Telemetry</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-10">
                                {[{ l: "Track DNA", v: "High speed", d: "Aero heavy" }, { l: "Elevation", v: "44.3m Δ", d: "Topography" }, { l: "Turn Count", v: "18", d: "Precision zones" }, { l: "Surface", v: "Bitumen", d: "High grip" }].map((m, i) => (
                                    <div key={i} className="bg-white/5 p-8 rounded-[40px] border border-white/5">
                                        <span className="block text-[11px] opacity-40 uppercase font-black tracking-widest mb-3">{m.l}</span>
                                        <span className="text-4xl font-black f1-italic tracking-tighter leading-none mb-2 block">{m.v}</span>
                                        <span className="text-[11px] font-bold text-accent-blue/60 uppercase">{m.d}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="mt-12 p-8 bg-accent-blue/5 rounded-[40px] border border-accent-blue/10 flex items-center gap-8">
                                <div className="flex-1">
                                    <span className="block text-[11px] opacity-40 uppercase font-black tracking-widest mb-2">Sync Quality</span>
                                    <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden"><div className="h-full bg-accent-blue w-[94%]"></div></div>
                                </div>
                                <span className="text-2xl font-black f1-italic text-accent-blue">94%</span>
                            </div>
                        </div>
                        <div className="order-1 lg:order-2 flex items-center justify-center p-12 bg-white/5 rounded-[64px] border border-white/5 relative group min-h-[500px]">
                            <img src={circuitUrl} alt={event} className="w-full h-full max-h-[600px] object-contain circuit-glow hover:scale-110 transition-transform duration-1000 select-none pb-12" />
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-f1-red/30 blur-[140px] -z-10 group-hover:bg-accent-blue/20 transition-colors duration-1000"></div>
                            <div className="absolute bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-5 px-10 py-4 bg-f1-red/10 rounded-full border border-f1-red/20">
                                <div className="w-4 h-4 rounded-full bg-f1-red pulse shadow-[0_0_20px_#e10600]"></div>
                                <span className="text-[14px] font-black uppercase tracking-[0.3em] text-f1-red">Sector Tracking Online</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const DriverCard = ({ driver, rank }) => {
            const color = teamColors[driver.team] || '#e10600';
            const headshot = getHeadshotUrl(driver.name);
            const prob = useMemo(() => (Math.exp(-Math.pow(driver.prediction - 1, 2) / (2 * 15.0)) * 100).toFixed(1), [driver.prediction]);

            return (
                <div className="glass rounded-[56px] overflow-hidden relative group">
                    <div className="h-2.5 w-full bg-current" style={{ color: color }}></div>
                    <div className="driver-image-container relative">
                        <div className="absolute top-8 right-16 f1-italic text-[16rem] opacity-[0.03] leading-none z-0 select-none">{driver.number}</div>
                        {headshot && <img src={headshot} alt={driver.name} className="driver-image" onError={(e) => e.target.style.display='none'} />}
                    </div>
                    <div className="p-12 relative z-10 -mt-10">
                        <div className="flex justify-between items-start mb-10">
                            <div>
                                <span className="text-[12px] font-black uppercase tracking-[0.2em] opacity-40">{driver.team}</span>
                                <h3 className="text-5xl font-black mt-1 uppercase italic font-f1 tracking-tighter leading-none">{driver.name}</h3>
                            </div>
                            <div className="bg-white/5 px-6 py-2 rounded-2xl text-[12px] font-bold uppercase tracking-widest border border-white/5">{driver.nationality}</div>
                        </div>
                        <div className="grid grid-cols-2 gap-8 mt-12">
                            <div className="bg-white/5 p-8 rounded-[40px] border border-white/5 shadow-inner">
                                <span className="block text-[12px] opacity-40 uppercase font-black tracking-widest mb-3">Win Intensity</span>
                                <span className="text-5xl font-black text-accent-blue f1-italic leading-none">{prob}%</span>
                            </div>
                            <div className="bg-white/5 p-8 rounded-[40px] border border-white/5 flex items-center justify-between shadow-inner">
                                <div>
                                    <span className="block text-[12px] opacity-40 uppercase font-black tracking-widest mb-3">Expected</span>
                                    <span className="text-5xl font-black f1-italic leading-none text-white/90">P{rank}</span>
                                </div>
                                {rank <= 3 && <div className={`w-14 h-14 rounded-2xl flex items-center justify-center ${rank === 1 ? 'bg-yellow-400/10 text-yellow-400' : 'bg-slate-400/10 text-slate-400'}`}><Icon name="trophy" size={28} /></div>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [data, setData] = useState(null);
            const [testMode, setTestMode] = useState(false);
            const [currentTestIndex, setCurrentTestIndex] = useState(0);

            const seasonvenues = Object.keys(circuitIdMap);

            useEffect(() => {
                const load = async () => {
                    try {
                        const res = await fetch('predictions.json');
                        const json = await res.json();
                        setData(json);
                    } catch (e) {
                        setData({ event: "Japanese Grand Prix", date: "March 27, 2026", top_10: [{ name: "M VERSTAPPEN", team: "Red Bull Racing", number: "3", nationality: "NED", prediction: 1.0 }]});
                    }
                    setTimeout(() => setLoading(false), 2000);
                };
                load();
            }, []);

            const activeEvent = testMode ? seasonvenues[currentTestIndex] : (data?.event || "Japanese Grand Prix");

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center p-8 bg-[#050505] overflow-hidden">
                    <div className="relative mb-16 scale-150"><div className="w-32 h-32 border-[5px] border-white/5 border-t-f1-red rounded-full animate-spin"></div></div>
                    <div className="w-80 h-1 bg-white/5 rounded-full overflow-hidden mt-8"><div className="loading-bar"></div></div>
                    <p className="f1-italic text-[13px] tracking-[0.5em] opacity-40 uppercase mt-12">Calibrating Season Intelligence</p>
                </div>
            );

            const intelMetrics = [
                { l: "Race Strategy", v: "2-STOP OPTIMAL", i: "zap" },
                { l: "Rain Liability", v: "14.2% LEVEL 1", i: "activity" },
                { l: "Safety Car Risk", v: "88% CRITICAL", i: "alert" }
            ];

            return (
                <div className="max-w-[1780px] mx-auto px-12 py-20 lg:py-40">
                    <header className="mb-32">
                        <div className="flex flex-wrap items-center gap-12 mb-16 px-4">
                            <div className="bg-f1-red/15 border border-f1-red/30 px-10 py-4 rounded-3xl flex items-center gap-6">
                                <div className="w-4 h-4 rounded-full bg-f1-red pulse shadow-[0_0_25px_rgba(225,6,0,1)]"></div>
                                <span className="text-[15px] font-black uppercase tracking-[0.3em] text-f1-red italic">Global Operations Hub</span>
                            </div>
                            <div className="flex gap-10 text-[14px] font-black uppercase tracking-[0.3em] opacity-30 font-f1">
                                <span>2026 SEASON HUB</span>
                                <span className="text-white opacity-100">•</span>
                                <span>{data.date}</span>
                                <span className="text-white opacity-100">•</span>
                                <span>LIVE GRID METADATA</span>
                            </div>
                        </div>
                        <div className="flex flex-col lg:flex-row justify-between items-end gap-32">
                            <div className="flex-1">
                                <h1 className="text-9xl lg:text-[18rem] font-black leading-[0.75] tracking-tighter f1-italic mb-20 select-none uppercase">{activeEvent}</h1>
                                <p className="text-white/40 text-4xl font-semibold max-w-6xl leading-relaxed italic">
                                    Next-gen predictive analytics syncing 2026 power cell telemetry with venue DNA. 
                                    Synchronized across the entire season hub.
                                </p>
                            </div>
                            <div className="flex flex-col gap-8">
                                <button onClick={() => setTestMode(!testMode)} className={`px-12 py-6 rounded-[32px] border font-black uppercase tracking-widest transition-all ${testMode ? 'bg-f1-red border-f1-red text-white' : 'glass border-white/10 text-white/40'}`}>
                                    {testMode ? 'Simulator Active' : 'Start Simulator'}
                                </button>
                                {testMode && (
                                    <div className="flex gap-4">
                                        <button onClick={() => setCurrentTestIndex((c) => (c - 1 + seasonvenues.length) % seasonvenues.length)} className="glass w-16 h-16 rounded-2xl flex items-center justify-center hover:bg-white/10">←</button>
                                        <button onClick={() => setCurrentTestIndex((c) => (c + 1) % seasonvenues.length)} className="glass w-16 h-16 rounded-2xl flex items-center justify-center hover:bg-white/10">→</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <VenueCommandCenter event={activeEvent} date={data.date} />
                    
                    <IntelSection metrics={intelMetrics} />

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 lg:gap-16">
                        {data.top_10.map((d, i) => <DriverCard key={d.name} driver={d} rank={i + 1} />)}
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
