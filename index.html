<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Predictor Hub | 2026 Season Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Titillium+Web:ital,wght@0,400;0,700;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0B0B0B;
            --bg-card: #151515;
            --f1-red: #e10600;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --radius-lg: 24px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header & Event Branding */
        .event-header {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            margin-bottom: 60px;
            align-items: center;
        }

        .event-info h1 {
            font-family: 'Titillium Web', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 0.9;
            margin-bottom: 20px;
        }

        .event-meta {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .badge-live {
            background: var(--f1-red);
            color: white;
            padding: 6px 16px;
            border-radius: 4px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; }
        }

        .circuit-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 30px;
            border: 1px solid var(--border-subtle);
            text-align: center;
            position: relative;
        }

        .circuit-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            filter: brightness(0) invert(1);
            opacity: 0.8;
        }

        /* Drivers Grid */
        .drivers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .driver-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border-subtle);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .driver-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .card-top {
            height: 180px;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            position: relative;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding-right: 10px;
        }

        .driver-number-bg {
            position: absolute;
            top: 10px;
            left: 20px;
            font-family: 'Titillium Web', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 5rem;
            opacity: 0.1;
            line-height: 1;
        }

        /* Mocked Driver Headshot via Initial/Number Graphic */
        .headshot-placeholder {
            width: 180px;
            height: 160px;
            background: linear-gradient(45deg, #222, #444);
            border-radius: 0 0 10px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            color: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .headshot-placeholder::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, var(--team-color, #f1red), transparent);
            opacity: 0.3;
        }

        .card-body {
            padding: 25px;
            border-top: 4px solid var(--team-color, var(--f1-red));
        }

        .driver-identity {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .name-container h2 {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            line-height: 1.1;
        }

        .nationality-flag {
            font-size: 1.2rem;
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .team-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: var(--radius-md);
        }

        .stat-item .label {
            display: block;
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-item .value {
            font-family: 'Titillium Web', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 1.4rem;
        }

        .rank-tag {
            background: var(--team-color, var(--f1-red));
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: 900;
            font-size: 0.9rem;
        }

        /* Loading State */
        #loading {
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .f1-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-subtle);
            border-top-color: var(--f1-red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1000px) {
            .event-header { grid-template-columns: 1fr; }
            .event-info h1 { font-size: 3rem; }
            .circuit-card { display: none; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="loading">
            <div class="f1-spinner"></div>
            <p style="margin-top: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;">Syncing 2026 Telemetry...</p>
        </div>

        <div id="content" style="display: none;">
            <div class="event-header">
                <div class="event-info">
                    <div class="event-meta">
                        <span class="badge-live">Live Intelligence</span>
                        <span id="update-date" style="color: var(--text-secondary); font-weight: 700; text-transform: uppercase; font-size: 0.8rem;"></span>
                    </div>
                    <h1 id="event-name">Japanese Grand Prix</h1>
                    <p style="color: var(--text-secondary); font-size: 1.2rem; max-width: 600px;">
                        AI-driven performance simulation using XGBoost regression and 2026 season power unit baselines.
                    </p>
                </div>
                <div class="circuit-card">
                    <img id="circuit-img" class="circuit-image" src="" alt="Circuit Layout">
                    <div style="margin-top: 15px; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">Official Track Layout</div>
                </div>
            </div>

            <div class="drivers-grid" id="drivers-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script>
        const teamColors = {
            'Red Bull Racing': '#3671C6', 'McLaren': '#FF8000', 'Ferrari': '#E80020',
            'Mercedes': '#27F4D2', 'Aston Martin': '#229971', 'RB': '#6692FF',
            'Haas F1 Team': '#B6BABD', 'Williams': '#64C4FF', 'Alpine': '#0093CC',
            'Audi': '#FFFFFF', 'Cadillac': '#FAB900', 'Kick Sauber': '#52E252',
            'Haas': '#B6BABD', 'Sauber': '#52E252'
        };

        const flagMap = {
            'NED': '🇳🇱', 'MEX': '🇲🇽', 'GBR': '🇬🇧', 'MON': '🇲🇨', 'AUS': '🇦🇺',
            'ITA': '🇮🇹', 'ESP': '🇪🇸', 'CAN': '🇨🇦', 'FRA': '🇫🇷', 'THA': '🇹🇭',
            'JPN': '🇯🇵', 'NZL': '🇳🇿', 'GER': '🇩🇪', 'CHN': '🇨🇳', 'USA': '🇺🇸'
        };

        // Map event names to FastF1 circuit IDs for images
        const circuitMap = {
            'Japanese Grand Prix': 'Suzuka',
            'Bahrain Grand Prix': 'Bahrain',
            'Saudi Arabian Grand Prix': 'Jeddah',
            'Australian Grand Prix': 'Melbourne',
            'Chinese Grand Prix': 'Shanghai',
            'Miami Grand Prix': 'Miami',
            'Emilia Romagna Grand Prix': 'Imola',
            'Monaco Grand Prix': 'Monaco',
            'Canadian Grand Prix': 'Montreal'
        };

        async function init() {
            try {
                const response = await fetch('predictions.json');
                const data = await response.json();
                
                document.getElementById('event-name').textContent = data.event;
                document.getElementById('update-date').textContent = data.date;
                
                // Set circuit image
                const circuitId = circuitMap[data.event] || 'Monaco';
                document.getElementById('circuit-img').src = `https://raw.githubusercontent.com/theOehrly/FastF1/master/fastf1/assets/circuit_layouts/${circuitId}.png`;

                const container = document.getElementById('drivers-list');
                container.innerHTML = '';

                data.top_10.forEach((driver, index) => {
                    const card = document.createElement('div');
                    card.className = 'driver-card';
                    const color = teamColors[driver.team] || '#e10600';
                    card.style.setProperty('--team-color', color);

                    const flag = flagMap[driver.nationality] || '🏁';
                    const initial = driver.name.split('. ').pop().charAt(0);

                    card.innerHTML = `
                        <div class="card-top">
                            <div class="driver-number-bg">${driver.number}</div>
                            <div class="headshot-placeholder">
                                ${initial}${driver.number}
                            </div>
                        </div>
                        <div class="card-body">
                            <span class="team-label">${driver.team}</span>
                            <div class="driver-identity">
                                <div class="name-container">
                                    <h2>${driver.name}</h2>
                                </div>
                                <div class="nationality-flag">${flag} ${driver.nationality}</div>
                            </div>
                            <div class="stats-row">
                                <div class="stat-item">
                                    <span class="label">Win Probability</span>
                                    <span class="value" style="color: ${index === 0 ? 'var(--f1-red)' : 'var(--accent-blue)'}">
                                        ${(100 - (driver.prediction * 5)).toFixed(1)}%
                                    </span>
                                </div>
                                <div class="rank-tag">P${index + 1}</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

            } catch (e) {
                console.error(e);
                document.getElementById('loading').innerHTML = `
                    <p style="color: var(--f1-red); font-weight: 800;">TELEMETRY LINK LOST</p>
                    <p style="font-size: 0.8rem; margin-top: 10px;">Check 2026 data stream availability.</p>
                `;
            }
        }

        init();
    </script>
</body>
</html>
